
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Bon de sortie cuisine</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/5.0.8/jspdf.plugin.autotable.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body{
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    padding: 14px;
    color: #222;
    background: #fafafa;
  }
  .toolbar{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:14px;
  }
  button{
    padding:7px 14px;
    font-size:13px;
    border:1px solid #2f5496;
    background:#2f5496;
    color:#fff;
    border-radius:6px;
    cursor:pointer;
    white-space:nowrap;
  }
  button.secondary{
    background:#fff;
    color:#2f5496;
  }
  button:disabled{
    opacity:.5;
    cursor:not-allowed;
  }
  button:hover:not(:disabled){ opacity:.9; }
  .statut{
    font-size:12px;
    color:#777;
    font-style:italic;
  }
  #content{
    background:#fff;
    border:1px solid #ccc;
    border-radius:8px;
    padding:16px 20px;
    max-width:1200px;
    overflow-x:auto;
  }
  #content .empty{
    color:#777;
    font-style:italic;
    margin:0;
  }
  @media print{
    .toolbar{ display:none; }
    #content{ border:none; padding:0; max-width:none; }
  }
</style>
</head>
<body>

  <div class="toolbar">
    <button id="btnExportCourant" disabled>Exporter ce bon de sortie (PDF)</button>
    <button id="btnExportTout" class="secondary">Exporter tous les bons de sortie (PDF)</button>
    <span id="statut" class="statut"></span>
  </div>

  <div id="content">
    <p class="empty">Sélectionnez une ligne dans le tableau pour afficher son bon de sortie.</p>
  </div>

<script>
const { jsPDF } = window.jspdf;

const MARGE_MM = 12;
const ORDRE_TYPE_PLAT = { 'Entrée': 0, 'Plat': 1, 'Fromage': 2, 'Dessert': 3, 'Pain': 4,
                           'Petit-déjeuner': 5, 'Goûter': 6, 'Pique-nique': 7, 'BBQ': 8 };
// repas regroupes sur une meme page quand ils coexistent le meme jour
const PAIRES_REPAS = [['Déjeuner', 'Pique-nique'], ['Dîner', 'BBQ']];
const ORDRE_AFFICHAGE = ['Petit-déjeuner', ['Déjeuner', 'Pique-nique'], 'Goûter', ['Dîner', 'BBQ']];

let currentHtml = '';
let currentEffectifId = null;
let currentTitre = 'Bon_de_sortie';

function setStatut(msg){
  document.getElementById('statut').textContent = msg || '';
}

function nettoyerNomFichier(s){
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'Bon_de_sortie';
}

function fmtQte(l){
  if (l.quantite) {
    const v = l.quantite;
    if (v === Math.trunc(v)) return String(Math.trunc(v));
    return v.toFixed(2).replace('.', ',');
  }
  if (l.quantiteTexte) return l.quantiteTexte;
  return '';
}

// Regroupe les lignes de menu par Type de plat puis par Recette, et
// construit des lignes de tableau avec rowSpan pour les cellules fusionnees
// (identique a la logique de regroupement utilisee pour l'apercu HTML).
function construireLignesAutoTable(lignes){
  const tries = [...lignes].sort((a, b) => a.idMenu - b.idMenu);
  const groupes = new Map();
  for (const l of tries) {
    const tp = l.plat || '';
    if (!groupes.has(tp)) groupes.set(tp, new Map());
    const parRecette = groupes.get(tp);
    const rc = l.recette || '';
    if (!parRecette.has(rc)) parRecette.set(rc, []);
    parRecette.get(rc).push(l);
  }
  const typesPlats = Array.from(groupes.keys()).sort((a, b) => {
    const ia = ORDRE_TYPE_PLAT[a] ?? 99, ib = ORDRE_TYPE_PLAT[b] ?? 99;
    return ia - ib || a.localeCompare(b, 'fr');
  });

  const rows = [];
  for (const tp of typesPlats) {
    const parRecette = groupes.get(tp);
    const recettes = Array.from(parRecette.keys());
    const totalTp = recettes.reduce((acc, r) => acc + parRecette.get(r).length, 0);
    let premierTp = true;
    for (const rc of recettes) {
      const ings = parRecette.get(rc);
      let premierRc = true;
      for (const ing of ings) {
        const row = [];
        if (premierTp) {
          row.push({ content: tp, rowSpan: totalTp, styles: { fontStyle: 'bold', fillColor: [245, 247, 251], valign: 'top' } });
          premierTp = false;
        }
        if (premierRc) {
          row.push({ content: rc, rowSpan: ings.length, styles: { fontStyle: 'bold', valign: 'top' } });
          premierRc = false;
        }
        row.push(ing.ingredient || '');
        row.push({ content: fmtQte(ing), styles: { halign: 'right' } });
        row.push(ing.mesure || '');
        row.push(ing.conditionnement || '');
        row.push(ing.sortie || '');
        row.push(ing.observation || '');
        rows.push(row);
      }
    }
  }
  if (rows.length === 0) {
    rows.push([{ content: 'Aucun plat enregistré pour ce jour et ce repas.', colSpan: 8, styles: { fontStyle: 'italic', textColor: [136, 136, 136] } }]);
  }
  return rows;
}

// Dessine un "bloc" repas (entete + tableau) a la position y courante,
// retourne la nouvelle position y.
function dessinerBloc(pdf, bloc, margeG, largeurUtile, y){
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(12);
  pdf.setTextColor(47, 84, 150);
  pdf.text(bloc.repasLibelle.toUpperCase(), margeG, y + 4);
  y += 7;

  pdf.setTextColor(0, 0, 0);
  pdf.setFont('helvetica', 'normal');
  pdf.setFontSize(9);
  const adultes = (bloc.animateurs || 0) + (bloc.personnel || 0);
  const total = (bloc.total !== null && bloc.total !== undefined) ? bloc.total : (bloc.enfants + bloc.jeunes + adultes);
  pdf.text(
    'Enfants : ' + bloc.enfants + '    Jeunes : ' + bloc.jeunes + '    Adultes : ' + adultes + '    Total : ' + total,
    margeG, y + 3
  );
  y += 7;

  const rows = construireLignesAutoTable(bloc.lignes);
  pdf.autoTable({
    startY: y,
    margin: { left: margeG, right: margeG, top: MARGE_MM, bottom: MARGE_MM },
    head: [['Menu', 'Recette', 'Ingrédient', 'Quantité', 'Mesure', 'Conditionnement', 'Sortie', 'Observations']],
    body: rows,
    theme: 'grid',
    styles: { fontSize: 8, cellPadding: 1.5, valign: 'top', lineColor: [51, 51, 51], lineWidth: 0.1 },
    headStyles: { fillColor: [232, 232, 232], textColor: [0, 0, 0], fontStyle: 'bold' },
    columnStyles: {
      0: { cellWidth: largeurUtile * 0.11 },
      1: { cellWidth: largeurUtile * 0.16 },
      2: { cellWidth: largeurUtile * 0.20 },
      3: { cellWidth: largeurUtile * 0.08 },
      4: { cellWidth: largeurUtile * 0.08 },
      5: { cellWidth: largeurUtile * 0.13 },
      6: { cellWidth: largeurUtile * 0.10 },
      7: { cellWidth: largeurUtile * 0.14 },
    },
  });

  return pdf.lastAutoTable.finalY + 8;
}

// Dessine une page complete (jour + un ou deux blocs repas regroupes)
function dessinerPage(pdf, page, premierePage){
  if (!premierePage) pdf.addPage('a4', 'landscape');
  const margeG = MARGE_MM;
  const largeurUtile = pdf.internal.pageSize.getWidth() - 2 * margeG;
  let y = MARGE_MM;

  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(16);
  pdf.setTextColor(0, 0, 0);
  pdf.text(page.jourLibelle, margeG, y + 5);
  y += 11;

  for (const bloc of page.blocs) {
    y = dessinerBloc(pdf, bloc, margeG, largeurUtile, y);
  }
}

// Regroupe les blocs (un par effectif jour/repas) en pages, en associant
// Dejeuner+Pique-nique et Diner+BBQ quand ils coexistent le meme jour.
function grouperEnPages(blocs){
  const parJour = new Map();
  for (const b of blocs) {
    if (!parJour.has(b.idJour)) {
      parJour.set(b.idJour, { jourLibelle: b.jourLibelle, jourOrdre: b.jourOrdre, parRepas: new Map() });
    }
    parJour.get(b.idJour).parRepas.set(b.repasLibelle, b);
  }

  const joursTries = Array.from(parJour.values()).sort((a, b) => a.jourOrdre - b.jourOrdre);
  const pages = [];

  for (const jourInfo of joursTries) {
    const dejaVus = new Set();
    for (const item of ORDRE_AFFICHAGE) {
      if (Array.isArray(item)) {
        const groupe = [];
        for (const libelle of item) {
          if (jourInfo.parRepas.has(libelle)) {
            groupe.push(jourInfo.parRepas.get(libelle));
            dejaVus.add(libelle);
          }
        }
        if (groupe.length) pages.push({ jourLibelle: jourInfo.jourLibelle, blocs: groupe });
      } else if (jourInfo.parRepas.has(item)) {
        pages.push({ jourLibelle: jourInfo.jourLibelle, blocs: [jourInfo.parRepas.get(item)] });
        dejaVus.add(item);
      }
    }
    // securite : tout repas non couvert par ORDRE_AFFICHAGE ci-dessus
    for (const [libelle, bloc] of jourInfo.parRepas.entries()) {
      if (!dejaVus.has(libelle)) pages.push({ jourLibelle: jourInfo.jourLibelle, blocs: [bloc] });
    }
  }
  return pages;
}

async function chargerDonnees(){
  const [effectifTable, jourTable, repasTable, menuTable] = await Promise.all([
    grist.docApi.fetchTable('Effectif'),
    grist.docApi.fetchTable('Jour'),
    grist.docApi.fetchTable('Repas'),
    grist.docApi.fetchTable('Menu'),
  ]);

  const jourById = {};
  for (let i = 0; i < jourTable.id.length; i++) {
    jourById[jourTable.id[i]] = { libelle: jourTable.Libelle[i], ordre: jourTable.Ordre[i] || 0 };
  }
  const repasById = {};
  for (let i = 0; i < repasTable.id.length; i++) {
    repasById[repasTable.id[i]] = repasTable.Libelle[i];
  }
  const menuParEffectif = new Map();
  for (let i = 0; i < menuTable.id.length; i++) {
    const idEff = menuTable.IdEffectif[i];
    if (!menuParEffectif.has(idEff)) menuParEffectif.set(idEff, []);
    menuParEffectif.get(idEff).push({
      idMenu: menuTable.IdMenu[i],
      plat: menuTable.Plat[i],
      recette: menuTable.Recette[i],
      ingredient: menuTable.Ingredient[i],
      quantite: menuTable.Quantite[i],
      quantiteTexte: menuTable.QuantiteTexte[i],
      mesure: menuTable.Mesure[i],
      conditionnement: menuTable.Conditionnement[i],
      sortie: menuTable.Sortie[i],
      observation: menuTable.Observation[i],
    });
  }

  const blocs = [];
  for (let i = 0; i < effectifTable.id.length; i++) {
    const id = effectifTable.id[i];
    const lignes = menuParEffectif.get(id) || [];
    if (lignes.length === 0) continue;
    const idJour = effectifTable.IdJour[i];
    const jourInfo = jourById[idJour] || { libelle: '', ordre: 0 };
    blocs.push({
      id,
      idJour,
      jourLibelle: jourInfo.libelle,
      jourOrdre: jourInfo.ordre,
      repasLibelle: repasById[effectifTable.IdRepas[i]] || '',
      enfants: effectifTable.Enfants[i] || 0,
      jeunes: effectifTable.Jeunes[i] || 0,
      animateurs: effectifTable.Animateurs[i] || 0,
      personnel: effectifTable.Personnel[i] || 0,
      total: effectifTable.Total[i],
      lignes,
    });
  }
  return blocs;
}

grist.ready({
  columns: [
    { name: "Html", title: "Bon de sortie (HTML)", type: "Text", optional: false }
  ],
  requiredAccess: 'full',
});

grist.onRecord((record, mappings) => {
  const mapped = (grist.mapColumnNames && grist.mapColumnNames(record, mappings)) || record;
  currentHtml = (mapped && mapped.Html) || '';
  currentEffectifId = record.id;
  const content = document.getElementById('content');
  const btn = document.getElementById('btnExportCourant');
  if (currentHtml) {
    content.innerHTML = currentHtml;
    const m1 = currentHtml.match(/<h1[^>]*>(.*?)<\/h1>/);
    const m2 = currentHtml.match(/<h2[^>]*>(.*?)<\/h2>/);
    currentTitre = nettoyerNomFichier(((m1 ? m1[1] : '') + '_' + (m2 ? m2[1] : '')).replace(/<[^>]+>/g, ''));
    btn.disabled = false;
  } else {
    content.innerHTML = '<p class="empty">Sélectionnez une ligne dans le tableau pour afficher son bon de sortie.</p>';
    btn.disabled = true;
  }
});

document.getElementById('btnExportCourant').addEventListener('click', async () => {
  if (currentEffectifId == null) return;
  const btn = document.getElementById('btnExportCourant');
  btn.disabled = true;
  setStatut('Génération du PDF…');
  try {
    const blocs = await chargerDonnees();
    const bloc = blocs.find(b => b.id === currentEffectifId);
    if (!bloc) {
      setStatut('Aucune donnée à exporter pour ce bon de sortie.');
      return;
    }
    // si un repas associe (Dejeuner/Pique-nique ou Diner/BBQ) existe le meme
    // jour, on l'inclut aussi sur la page, comme pour l'export complet
    const pages = grouperEnPages(blocs.filter(b => b.idJour === bloc.idJour));
    const page = pages.find(p => p.blocs.some(b => b.id === currentEffectifId)) || { jourLibelle: bloc.jourLibelle, blocs: [bloc] };

    const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'landscape' });
    dessinerPage(pdf, page, true);
    pdf.save(currentTitre + '.pdf');
    setStatut('');
  } catch (err) {
    setStatut('Erreur : ' + err.message);
  } finally {
    btn.disabled = false;
  }
});

document.getElementById('btnExportTout').addEventListener('click', async () => {
  const btn = document.getElementById('btnExportTout');
  btn.disabled = true;
  try {
    setStatut('Chargement des données…');
    const blocs = await chargerDonnees();
    const pages = grouperEnPages(blocs);

    if (pages.length === 0) {
      setStatut('Aucun bon de sortie à exporter.');
      return;
    }

    setStatut('Génération du PDF (' + pages.length + ' pages)…');
    const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'landscape' });
    pages.forEach((page, idx) => dessinerPage(pdf, page, idx === 0));
    pdf.save('Bons_de_sortie_complets.pdf');
    setStatut('');
  } catch (err) {
    setStatut('Erreur : ' + err.message);
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
