
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Bon de sortie cuisine</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body{
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    padding: 14px;
    color: #222;
    background: #fafafa;
  }
  .toolbar{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:14px;
  }
  button{
    padding:7px 14px;
    font-size:13px;
    border:1px solid #2f5496;
    background:#2f5496;
    color:#fff;
    border-radius:6px;
    cursor:pointer;
    white-space:nowrap;
  }
  button.secondary{
    background:#fff;
    color:#2f5496;
  }
  button:disabled{
    opacity:.5;
    cursor:not-allowed;
  }
  button:hover:not(:disabled){ opacity:.9; }
  .statut{
    font-size:12px;
    color:#777;
    font-style:italic;
  }
  #content{
    background:#fff;
    border:1px solid #ccc;
    border-radius:8px;
    padding:16px 20px;
    max-width:1200px;
    overflow-x:auto;
  }
  #content .empty{
    color:#777;
    font-style:italic;
    margin:0;
  }
  @media print{
    .toolbar{ display:none; }
    #content{ border:none; padding:0; max-width:none; }
  }
</style>
</head>
<body>

  <div class="toolbar">
    <button id="btnExportCourant" disabled>Exporter ce bon de sortie (PDF)</button>
    <button id="btnExportTout" class="secondary">Exporter tous les bons de sortie (PDF)</button>
    <span id="statut" class="statut"></span>
  </div>

  <div id="content">
    <p class="empty">Sélectionnez une ligne dans le tableau pour afficher son bon de sortie.</p>
  </div>

  <!-- conteneur hors ecran utilise pour le rendu des PDF (largeur fixe = paysage) -->
  <div id="renderZone" style="position:fixed; left:-99999px; top:0; width:1400px; background:#fff;"></div>

<script>
const { jsPDF } = window.jspdf;

// largeur de reference "paysage" (A4 paysage = 297mm). On rend le contenu a
// une largeur fixe en pixels puis on calcule la hauteur de page necessaire
// pour que TOUT le contenu tienne sur une seule page, quelle que soit sa
// longueur (le PDF s'adapte plutot que de couper sur plusieurs pages).
const LARGEUR_PAGE_MM = 297;
const LARGEUR_RENDU_PX = 1400;

let currentHtml = '';
let currentTitre = 'Bon_de_sortie';

function extraireTitre(htmlStr){
  const m1 = htmlStr.match(/<h1[^>]*>(.*?)<\/h1>/);
  const m2 = htmlStr.match(/<h2[^>]*>(.*?)<\/h2>/);
  const jour = m1 ? m1[1].replace(/<[^>]+>/g, '') : '';
  const repas = m2 ? m2[1].replace(/<[^>]+>/g, '') : '';
  const nettoye = (jour + '_' + repas)
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-zA-Z0-9]+/g, '_')
    .replace(/^_+|_+$/g, '');
  return nettoye || 'Bon_de_sortie';
}

function setStatut(msg){
  document.getElementById('statut').textContent = msg || '';
}

// Rend un fragment HTML dans la zone hors-ecran et retourne un canvas
async function rendreCanvas(htmlStr){
  const zone = document.getElementById('renderZone');
  zone.innerHTML = htmlStr;
  // laisser le temps au navigateur de mettre en page avant capture
  await new Promise(r => setTimeout(r, 30));
  const canvas = await html2canvas(zone, {
    scale: 2,
    backgroundColor: '#ffffff',
    width: LARGEUR_RENDU_PX,
    windowWidth: LARGEUR_RENDU_PX,
  });
  return canvas;
}

function canvasVersDimensionsMm(canvas){
  const hauteurMm = (canvas.height / canvas.width) * LARGEUR_PAGE_MM;
  return { largeur: LARGEUR_PAGE_MM, hauteur: hauteurMm };
}

grist.ready({
  columns: [
    { name: "Html", title: "Bon de sortie (HTML)", type: "Text", optional: false }
  ],
  requiredAccess: 'full',
});

grist.onRecord((record, mappings) => {
  const mapped = (grist.mapColumnNames && grist.mapColumnNames(record, mappings)) || record;
  currentHtml = (mapped && mapped.Html) || '';
  const content = document.getElementById('content');
  const btn = document.getElementById('btnExportCourant');
  if (currentHtml) {
    content.innerHTML = currentHtml;
    currentTitre = extraireTitre(currentHtml);
    btn.disabled = false;
  } else {
    content.innerHTML = '<p class="empty">Sélectionnez une ligne dans le tableau pour afficher son bon de sortie.</p>';
    btn.disabled = true;
  }
});

document.getElementById('btnExportCourant').addEventListener('click', async () => {
  if (!currentHtml) return;
  const btn = document.getElementById('btnExportCourant');
  btn.disabled = true;
  setStatut('Génération du PDF…');
  try {
    const canvas = await rendreCanvas(currentHtml);
    const { largeur, hauteur } = canvasVersDimensionsMm(canvas);
    const pdf = new jsPDF({ unit: 'mm', format: [largeur, hauteur], orientation: 'landscape' });
    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, largeur, hauteur);
    pdf.save(currentTitre + '.pdf');
    setStatut('');
  } catch (err) {
    setStatut('Erreur : ' + err.message);
  } finally {
    btn.disabled = false;
  }
});

document.getElementById('btnExportTout').addEventListener('click', async () => {
  const btn = document.getElementById('btnExportTout');
  btn.disabled = true;
  try {
    setStatut('Chargement des données…');
    const [effectifTable, jourTable, repasTable] = await Promise.all([
      grist.docApi.fetchTable('Effectif'),
      grist.docApi.fetchTable('Jour'),
      grist.docApi.fetchTable('Repas'),
    ]);

    const ordreJour = {};
    for (let i = 0; i < jourTable.id.length; i++) {
      ordreJour[jourTable.id[i]] = jourTable.Ordre ? jourTable.Ordre[i] : 0;
    }
    const ORDRE_REPAS = ['Petit-déjeuner', 'Déjeuner', 'Goûter', 'Pique-nique', 'BBQ', 'Dîner'];
    const libelleRepas = {};
    for (let i = 0; i < repasTable.id.length; i++) {
      libelleRepas[repasTable.id[i]] = repasTable.Libelle[i];
    }

    const lignes = [];
    for (let i = 0; i < effectifTable.id.length; i++) {
      const html = effectifTable.Html ? effectifTable.Html[i] : '';
      if (!html) continue;
      const idJour = effectifTable.IdJour[i];
      const idRepas = effectifTable.IdRepas[i];
      const libRepas = libelleRepas[idRepas] || '';
      lignes.push({
        html,
        ordreJour: ordreJour[idJour] || 0,
        ordreRepas: ORDRE_REPAS.indexOf(libRepas),
      });
    }

    lignes.sort((a, b) => {
      if (a.ordreJour !== b.ordreJour) return a.ordreJour - b.ordreJour;
      const ra = a.ordreRepas === -1 ? 99 : a.ordreRepas;
      const rb = b.ordreRepas === -1 ? 99 : b.ordreRepas;
      return ra - rb;
    });

    if (lignes.length === 0) {
      setStatut('Aucun bon de sortie à exporter.');
      btn.disabled = false;
      return;
    }

    let pdf = null;
    for (let i = 0; i < lignes.length; i++) {
      setStatut('Génération du PDF… (' + (i + 1) + ' / ' + lignes.length + ')');
      const canvas = await rendreCanvas(lignes[i].html);
      const { largeur, hauteur } = canvasVersDimensionsMm(canvas);
      if (!pdf) {
        pdf = new jsPDF({ unit: 'mm', format: [largeur, hauteur], orientation: 'landscape' });
      } else {
        pdf.addPage([largeur, hauteur], 'landscape');
      }
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, largeur, hauteur);
    }

    pdf.save('Bons_de_sortie_complets.pdf');
    setStatut('');
  } catch (err) {
    setStatut('Erreur : ' + err.message);
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
